name: Todo App CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Check dependencies installation
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

  lint:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install flake8
        run: pip install flake8
      - name: Run flake8
        run: flake8 .

  test:
    runs-on: ubuntu-latest
    needs: build
    env:
      DATABASE_URL: "sqlite:///./test.db"
      PYTHONPATH: "."
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Pytest with Coverage
        run: pytest tests/ --cov=app.src --cov-report=xml --cov-fail-under=50
      
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  docker_build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
          
      - name: Get short SHA
        id: slug
        run: echo "sha8=$(echo ${GITHUB_SHA} | cut -c1-8)" >> $GITHUB_OUTPUT
        
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: app/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/todo-app:${{ steps.slug.outputs.sha8 }}
            ${{ secrets.DOCKER_USERNAME }}/todo-app:latest
  deploy:
    runs-on: ubuntu-latest
    needs: [lint, test, docker_build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Git config
        run: |
          git config --global user.name "${{ secrets.DEPLOY_USER_NAME }}"
          git config --global user.email "${{ secrets.DEPLOY_USER_EMAIL }}"

      - name: Deploy Version Tag
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          
          SHORT_SHA=$(echo ${GITHUB_SHA} | cut -c1-8)
          
          git tag -a "v-${SHORT_SHA}" -m "Auto-deploy release ${SHORT_SHA}"
          
          git push origin "v-${SHORT_SHA}"