name: Todo App CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # 1. Проверка сборки (Установка зависимостей)
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Check dependencies installation
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

  # 2. Линтер
  lint:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install flake8
        run: pip install flake8
      - name: Run flake8
        run: flake8 .

  # 3. Тесты и Coverage
  test:
    runs-on: ubuntu-latest
    needs: build
    env:
      # Заглушка, чтобы db.py не падал при импорте. Реально тесты используют SQLite.
      DATABASE_URL: "sqlite:///./test.db"
      PYTHONPATH: "."
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Pytest with Coverage
        run: pytest tests/ --cov=app.src --cov-report=xml --cov-fail-under=50
      
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # 4. Сборка Docker и Push в Docker Hub
  docker_build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
          
      - name: Get short SHA
        id: slug
        run: echo "sha8=$(echo ${GITHUB_SHA} | cut -c1-8)" >> $GITHUB_OUTPUT
        
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: app/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/todo-app:${{ steps.slug.outputs.sha8 }}
            ${{ secrets.DOCKER_USERNAME }}/todo-app:latest